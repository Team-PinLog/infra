# infra 저장소 검증
#
# YAML이 깨져서 prod가 터지는 부류를 ArgoCD가 보기 전에 잡는다.
# ArgoCD는 잘못된 매니페스트를 받으면 Sync 실패 상태로 멈추는데,
# 그걸 발표 직전에 발견하는 것보다 PR에서 막는 게 낫다.
name: validate

on:
  push:
    branches: [main]
  pull_request:
  # Actions 탭에서 수동 실행. 트리거 문제를 진단하거나
  # 코드 변경 없이 검증만 다시 돌리고 싶을 때 쓴다.
  workflow_dispatch:

permissions:
  contents: read

jobs:
  guardrails:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11d5960a326750d5838078e36cf38b85af677262 # v4
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: "3.12"
      - name: Install hash-locked guardrail dependencies
        run: python -m pip install --require-hashes -r .github/requirements-guardrails.txt
      - name: Repository policy tests
        run: python -m unittest discover -s tests -v

  helm:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11d5960a326750d5838078e36cf38b85af677262 # v4

      - uses: azure/setup-helm@1a275c3b69536ee54be43f2070a358922e12c8d4 # v4
        with:
          version: v3.16.3

      - name: kubeconform 설치
        run: |
          set -euo pipefail
          archive="kubeconform-linux-amd64.tar.gz"
          curl -fsSLo "$archive" \
            "https://github.com/yannh/kubeconform/releases/download/v0.6.7/$archive"
          echo "95f14e87aa28c09d5941f11bd024c1d02fdc0303ccaa23f61cef67bc92619d73  $archive" \
            | sha256sum -c -
          tar -xzf "$archive" -C /usr/local/bin kubeconform

      - name: helm lint
        run: helm lint charts/microservice

      - name: 서비스별 렌더링 + 스키마 검증
        run: |
          set -euo pipefail
          # 아직 서비스가 없으면 glob이 확장되지 않아 리터럴 문자열이
          # 그대로 넘어가고 helm template이 실패한다. nullglob으로 막는다.
          shopt -s nullglob
          fail=0
          count=0
          for values in apps/*/*/values.yaml; do
            count=$((count+1))
            env=$(basename "$(dirname "$(dirname "$values")")")
            svc=$(basename "$(dirname "$values")")
            echo "::group::$env/$svc"

            if ! helm template "$svc" charts/microservice \
                   --values "$values" \
                   --namespace "pinlog-$env" \
                 | kubeconform -strict -summary \
                     -schema-location default \
                     -schema-location 'https://raw.githubusercontent.com/datreeio/CRDs-catalog/main/{{.Group}}/{{.ResourceKind}}_{{.ResourceAPIVersion}}.json'
            then
              echo "::error::$env/$svc 검증 실패"
              fail=1
            fi
            echo "::endgroup::"
          done
          if [ "$count" -eq 0 ]; then
            echo "검증할 서비스가 아직 없습니다 (apps/ 비어 있음)"
          else
            echo "서비스 $count 개 검증 완료"
          fi
          exit $fail

      - name: platform 매니페스트 검증
        run: |
          # *-values.yaml 은 Helm 차트에 넘기는 값 파일이지 쿠버네티스
          # 매니페스트가 아니다. apiVersion/kind가 없어 kubeconform이
          # "missing 'kind' key"로 실패한다.
          # (platform/monitoring/*-values.yaml 이 여기 해당)
          kubeconform -strict -summary -ignore-missing-schemas \
            -schema-location default \
            -ignore-filename-pattern '.*-values\.yaml$' \
            platform/ argocd/
