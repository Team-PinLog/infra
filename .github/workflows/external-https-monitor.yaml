name: external-https-monitor

on:
  schedule:
    # GitHub-hosted runner에서 클러스터 외부 HTTPS/TLS 가용성을 확인한다.
    - cron: "*/5 * * * *"
  workflow_dispatch:
    inputs:
      target_url:
        description: "Probe target URL"
        required: false
        default: "https://i15a705.p.ssafy.io/grafana/login"
      expect_status:
        description: "Expected HTTP status"
        required: false
        default: "200"
      force_notify:
        description: "Send Mattermost notification even when state did not change"
        required: false
        default: "false"
      dry_run:
        description: "Do not post Mattermost or update state"
        required: false
        default: "false"

permissions:
  contents: write

concurrency:
  group: external-https-monitor
  cancel-in-progress: false

jobs:
  probe:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    env:
      MATTERMOST_WEBHOOK_URL: ${{ secrets.MATTERMOST_WEBHOOK_URL }}
      TARGET_URL: ${{ github.event.inputs.target_url || 'https://i15a705.p.ssafy.io/grafana/login' }}
      EXPECT_STATUS: ${{ github.event.inputs.expect_status || '200' }}
      STATE_BRANCH: "monitor-state"
      STATE_DIR: ".monitor-state"
      STATE_RELATIVE_FILE: ".github/monitoring/external_https_state.json"
      FORCE_NOTIFY: ${{ github.event.inputs.force_notify || 'false' }}
      DRY_RUN: ${{ github.event.inputs.dry_run || 'false' }}
      TLS_WARNING_DAYS: "14"
      TLS_CRITICAL_DAYS: "7"
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          fetch-depth: 0

      - name: Checkout monitor state branch
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          ref: monitor-state
          path: .monitor-state
          fetch-depth: 1

      - name: Run external HTTPS/TLS probe
        id: probe
        continue-on-error: true
        run: |
          export STATE_FILE="$STATE_DIR/$STATE_RELATIVE_FILE"
          python3 .github/scripts/external_https_probe.py

      - name: Commit monitor state when changed
        if: env.DRY_RUN != 'true'
        run: |
          set -euo pipefail
          if [ -z "$(git -C "$STATE_DIR" status --porcelain -- "$STATE_RELATIVE_FILE")" ]; then
            echo "monitor_state_changed=false"
            exit 0
          fi
          git -C "$STATE_DIR" config user.name "github-actions[bot]"
          git -C "$STATE_DIR" config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git -C "$STATE_DIR" add "$STATE_RELATIVE_FILE"
          git -C "$STATE_DIR" commit -m "chore: update external monitor state" \
            -m "Automated state transition for PinLog external HTTPS/TLS monitor."
          git -C "$STATE_DIR" push origin HEAD:"$STATE_BRANCH"
          echo "monitor_state_changed=true"

      - name: Fail workflow when probe is down
        if: steps.probe.outcome == 'failure'
        run: exit 1
