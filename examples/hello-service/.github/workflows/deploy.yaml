# hello-service 빌드 및 배포
#
# 흐름:
#   push → 이미지 빌드 → GHCR 푸시 → infra 저장소의 태그 갱신 커밋
#   → ArgoCD가 감지해 자동 배포
#
# ArgoCD Image Updater 대신 CI가 직접 커밋하는 방식을 쓴다.
# git이 문자 그대로 진실의 원천이 되고, git revert가 곧 롤백 전략이 된다.
name: deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  packages: write   # GHCR 푸시. GITHUB_TOKEN으로 충분하며 별도 PAT가 필요 없다.

env:
  IMAGE: ghcr.io/team-pinlog/hello-service

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: 이미지 태그 결정
        id: meta
        run: |
          # 불변 태그를 쓴다. latest는 지금 뭐가 돌고 있는지 알 수 없게 만들고,
          # 그게 필요한 순간은 발표 전날 새벽이다.
          echo "tag=sha-$(git rev-parse --short HEAD)" >> "$GITHUB_OUTPUT"

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: 빌드 및 GHCR 푸시
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ env.IMAGE }}:${{ steps.meta.outputs.tag }}
          build-args: BUILD_SHA=${{ steps.meta.outputs.tag }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # ---- infra 저장소 갱신 (GitOps) ----
      - name: infra 저장소 체크아웃
        uses: actions/checkout@v4
        with:
          repository: Team-PinLog/infra
          token: ${{ secrets.INFRA_REPO_TOKEN }}
          path: infra

      - name: 이미지 태그 갱신 및 커밋
        working-directory: infra
        run: |
          set -euo pipefail

          # ubuntu-latest에 yq가 있지만, 러너 이미지 변경에 영향받지 않도록
          # 명시적으로 설치한다.
          if ! command -v yq &>/dev/null; then
            sudo curl -fsSL -o /usr/local/bin/yq \
              https://github.com/mikefarah/yq/releases/latest/download/yq_linux_amd64
            sudo chmod +x /usr/local/bin/yq
          fi

          yq -i '.image.tag = "${{ steps.meta.outputs.tag }}"' \
            apps/prod/hello-service/values.yaml

          git config user.name  "pinlog-ci"
          git config user.email "ci@pinlog.local"

          # 태그가 그대로면 커밋할 게 없어 git commit이 실패한다.
          # 재실행(workflow_dispatch)이나 문서만 바뀐 커밋에서 발생한다.
          if git diff --quiet; then
            echo "이미지 태그 변경 없음 — 커밋 생략"
            exit 0
          fi

          git commit -am "chore(hello-service): ${{ steps.meta.outputs.tag }}"
          git push

      - name: 배포 안내
        run: |
          echo "이미지: ${{ env.IMAGE }}:${{ steps.meta.outputs.tag }}"
          echo "ArgoCD가 최대 3분 내 반영합니다."
          echo "확인: curl https://i15a705.p.ssafy.io/api/hello"
