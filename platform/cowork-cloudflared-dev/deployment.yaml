apiVersion: apps/v1
kind: Deployment
metadata:
  name: cowork-cloudflared
  namespace: pinlog-dev
  labels:
    app.kubernetes.io/name: cowork-cloudflared
    app.kubernetes.io/component: tunnel
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app.kubernetes.io/name: cowork-cloudflared
  template:
    metadata:
      labels:
        app.kubernetes.io/name: cowork-cloudflared
        app.kubernetes.io/component: tunnel
    spec:
      automountServiceAccountToken: false
      securityContext:
        runAsNonRoot: true
        runAsUser: 65532
        runAsGroup: 65532
        fsGroup: 65532
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: cloudflared
          image: cloudflare/cloudflared:2026.7.2@sha256:4f6655284ab3d252b7f28fedb19fe6c8fc82ee5b1295c20ac74d475e5398a52d
          imagePullPolicy: IfNotPresent
          args:
            - tunnel
            - --no-autoupdate
            - --metrics
            - 0.0.0.0:2000
            - run
            - --token-file
            - /etc/cloudflared/token
          ports:
            - name: metrics
              containerPort: 2000
              protocol: TCP
          startupProbe:
            httpGet:
              path: /ready
              port: metrics
            periodSeconds: 2
            failureThreshold: 30
          readinessProbe:
            httpGet:
              path: /ready
              port: metrics
            periodSeconds: 5
            failureThreshold: 3
          livenessProbe:
            httpGet:
              path: /ready
              port: metrics
            periodSeconds: 15
            failureThreshold: 3
          resources:
            requests:
              cpu: 20m
              memory: 64Mi
            limits:
              cpu: 200m
              memory: 256Mi
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
            readOnlyRootFilesystem: true
            runAsNonRoot: true
            runAsUser: 65532
            runAsGroup: 65532
          volumeMounts:
            - name: tunnel-token
              mountPath: /etc/cloudflared
              readOnly: true
      volumes:
        - name: tunnel-token
          secret:
            secretName: cowork-cloudflared-token
            defaultMode: 0440
