replicaCount: 1

image:
  repository: ghcr.io/team-pinlog/cowork
  tag: a2bdba59106be41c680eb7187eb111c9909dbad9
  digest: sha256:9e9badb57e1f915e6be0643e9d144f34c92458904f31e84102e1e1bc86a6eb53
  pullPolicy: IfNotPresent

imagePullSecrets:
  - name: ghcr-cowork-pull

# SQLite와 Hermes profile을 하나의 PVC에 보존하므로 두 Pod를 동시에 띄우지 않는다.
deploymentStrategy:
  type: Recreate

service:
  type: ClusterIP
  port: 80
  targetPort: 8080

ingress:
  enabled: false

probes:
  enabled: true
  path: /health
  startup:
    failureThreshold: 30
    periodSeconds: 2
  liveness:
    periodSeconds: 15
    failureThreshold: 3
  readiness:
    periodSeconds: 5
    failureThreshold: 3

metrics:
  enabled: false

env:
  - name: COWORK_ENV
    value: development
  - name: COWORK_COOKIE_SECURE
    value: "true"
  - name: COWORK_DATABASE_PATH
    value: /data/cowork/cowork.db
  - name: COWORK_AGENT_TIMEOUT_SECONDS
    value: "120"
  - name: JIRA_PROJECT_KEY
    value: S15P11A705
  - name: JIRA_BASE_URL
    value: https://ssafy.atlassian.net
  - name: HERMES_HOME
    value: /data/cowork/hermes
  - name: HERMES_PYTHON
    value: /usr/local/bin/python
  - name: XDG_CACHE_HOME
    value: /data/cowork/cache

resources:
  requests:
    cpu: 200m
    memory: 256Mi
  limits:
    cpu: "1"
    memory: 1Gi

podSecurityContext:
  runAsNonRoot: true
  runAsUser: 1000
  runAsGroup: 1000
  fsGroup: 1000
  fsGroupChangePolicy: OnRootMismatch

securityContext:
  allowPrivilegeEscalation: false
  capabilities:
    drop:
      - ALL
  runAsNonRoot: true
  runAsUser: 1000
  runAsGroup: 1000

persistence:
  enabled: true
  mountPath: /data
  size: 1Gi
  storageClass: local-path-retain
  accessModes:
    - ReadWriteOnce

autoscaling:
  enabled: false

podDisruptionBudget:
  enabled: false

serviceAccount:
  create: true
  name: ""
