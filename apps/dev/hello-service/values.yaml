# hello-service (dev)
#
# dev는 기본적으로 꺼져 있다 (replicaCount: 0).
#
# 15Gi 서버에서 dev/prod를 전부 미러링하면 자원이 부족하다.
# 서비스 6개 × 384Mi × 2환경 ≈ 4.6Gi가 프론트엔드 전에 request로 잡히고,
# 스케줄러가 강제하는 건 limit이 아니라 request다.
#
# 작업할 때만 올린다:
#   kubectl -n pinlog-dev scale deploy/hello-service --replicas=1
#
# services-dev ApplicationSet은 selfHeal이 꺼져 있어서
# 수동으로 올린 replicas를 ArgoCD가 되돌리지 않는다.

replicaCount: 0

image:
  repository: ghcr.io/team-pinlog/hello-service
  tag: sha-PLACEHOLDER

# dev는 인터넷에 노출하지 않는다.
# 접근은 Tailscale 또는 kubectl port-forward로 한다.
#   kubectl -n pinlog-dev port-forward svc/hello-service 8080:80
ingress:
  enabled: false

service:
  targetPort: 8080

# prod와 동일하게 context-path 를 반영한다. (사유는 prod values.yaml 참고)
probes:
  path: /api/hello/actuator/health

resources:
  requests:
    memory: 256Mi
    cpu: 50m
  limits:
    memory: 512Mi
    cpu: 300m
