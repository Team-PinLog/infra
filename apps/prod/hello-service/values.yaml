# hello-service (prod)
#
# 플랫폼 검증용 서비스. 실제 기능 개발 전에 이걸로 전체 파이프라인을 뚫는다.
#   GitHub Actions 빌드 → GHCR 푸시 → CI가 이 파일의 tag를 커밋
#   → ArgoCD 동기화 → 파드 롤링 → curl로 새 SHA 확인
#
# 이 왕복이 사람 손 없이 돌면 플랫폼은 완성이다.
# 이후 서비스 추가는 이 디렉터리를 복사하는 것으로 끝난다.

image:
  repository: ghcr.io/team-pinlog/hello-service
  # CI가 이 줄을 yq로 갱신한다. 수동으로 고치지 말 것.
  tag: sha-PLACEHOLDER

ingress:
  enabled: true
  host: i15a705.p.ssafy.io
  path: /api/hello

service:
  targetPort: 8080

# 검증용이라 최소 자원만 준다.
resources:
  requests:
    memory: 256Mi
    cpu: 50m
  limits:
    memory: 512Mi
    cpu: 300m
