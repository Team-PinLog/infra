apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: monitoring-alloy
  namespace: argocd
  annotations:
    # Loki(wave 2)가 먼저 떠 있어야 로그를 밀어넣을 수 있다.
    argocd.argoproj.io/sync-wave: "3"
spec:
  project: pinlog
  sources:
    - repoURL: https://grafana.github.io/helm-charts
      chart: alloy
      targetRevision: 1.10.1
      helm:
        releaseName: alloy
        valueFiles:
          - $values/platform/monitoring/alloy-values.yaml
    - repoURL: https://github.com/Team-PinLog/infra.git
      targetRevision: main
      ref: values
  destination:
    server: https://kubernetes.default.svc
    namespace: monitoring
  syncPolicy:
    automated:
      # Alloy는 상태를 갖지 않으므로 prune 가능하다.
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=false
