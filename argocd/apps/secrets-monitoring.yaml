apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: secrets-monitoring
  namespace: argocd
  annotations:
    # Grafana(wave 2)가 뜨기 전에 admin 비밀번호 Secret이 있어야 한다.
    argocd.argoproj.io/sync-wave: "-1"
spec:
  project: pinlog
  source:
    repoURL: https://github.com/Team-PinLog/infra.git
    targetRevision: main
    path: secrets/monitoring
  destination:
    server: https://kubernetes.default.svc
    namespace: monitoring
  syncPolicy:
    automated:
      prune: false
      selfHeal: true
