apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: secrets-dev
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "-1"
spec:
  project: pinlog
  source:
    repoURL: https://github.com/Team-PinLog/infra.git
    targetRevision: main
    path: secrets/dev
  destination:
    server: https://kubernetes.default.svc
    namespace: pinlog-dev
  syncPolicy:
    automated:
      # SealedSecret 삭제가 즉시 복호화 Secret 삭제로 이어지지 않도록
      # credential 제거는 별도 승인 작업으로 남긴다.
      prune: false
      selfHeal: true
    syncOptions:
      - CreateNamespace=false
