apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: secrets-prod
  namespace: argocd
  annotations:
    # SealedSecret이 Postgres보다 먼저 적용되어야 한다.
    # 컨트롤러가 복호화해서 실제 Secret을 만들어야 DB 파드가 뜬다.
    argocd.argoproj.io/sync-wave: "-1"
spec:
  project: pinlog
  source:
    repoURL: https://github.com/Team-PinLog/infra.git
    targetRevision: main
    path: secrets/prod
  destination:
    server: https://kubernetes.default.svc
    namespace: pinlog-prod
  syncPolicy:
    automated:
      # prune: false — SealedSecret이 사라지면 컨트롤러가 만든 Secret도
      # 함께 지워져 앱이 죽는다. 삭제는 수동으로 판단한다.
      prune: false
      selfHeal: true
